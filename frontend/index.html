<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Avto E'lonlar</title>
<!-- Telegram Mini App WebView keshni qattiq ushlab turadi — style.css/app.js
     o'zgartirilganda pastdagi ?v=N raqamini oshiring, aks holda foydalanuvchi
     eski keshlangan faylni ko'raveradi. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=27" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="app">

  <!-- Yuqori panel -->
  <header class="topbar">
    <button class="icon-btn" id="btnMyListings" aria-label="Mening e'lonlarim">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20C4 16.134 7.582 13 12 13C16.418 13 20 16.134 20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="topbar__title">AUTO<span>SAVDO</span></div>
    <button class="icon-btn theme-toggle" id="btnTheme" aria-label="Kunduzgi/tungi rejimni almashtirish">
      <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8.5 8.5 0 019.5 4 8.5 8.5 0 1020 14.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <!-- ============ FEED VIEW ============ -->
  <main class="view" id="view-feed">

    <div class="filters" id="filters">
      <div class="search-wrap">
        <div class="search-box">
          <input class="chip-input" id="fSearch" type="text" placeholder="Marka, model yoki hudud bo'yicha qidirish" />
          <button type="button" class="search-box__adv-btn" id="btnAdvancedToggle" aria-label="Qo'shimcha parametrlar" aria-expanded="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="9" cy="7" r="2.2" fill="currentColor"/>
              <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="16" cy="12" r="2.2" fill="currentColor"/>
              <line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="17" r="2.2" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <div class="advanced-filters" id="advancedFilters">
          <div class="advanced-filters__inner">
            <div class="advanced-filters__row">
              <span class="advanced-filters__label">Yili</span>
              <div class="advanced-filters__inputs">
                <input class="chip-input" id="fYearMin" type="number" placeholder="dan" />
                <span class="advanced-filters__sep">—</span>
                <input class="chip-input" id="fYearMax" type="number" placeholder="gacha" />
              </div>
            </div>
            <div class="advanced-filters__row">
              <span class="advanced-filters__label">Probeg, km</span>
              <div class="advanced-filters__inputs">
                <input class="chip-input" id="fMileageMin" type="text" inputmode="numeric" autocomplete="off" placeholder="dan" />
                <span class="advanced-filters__sep">—</span>
                <input class="chip-input" id="fMileageMax" type="text" inputmode="numeric" autocomplete="off" placeholder="gacha" />
              </div>
            </div>
            <div class="advanced-filters__row">
              <span class="advanced-filters__label">Narxi, $</span>
              <div class="advanced-filters__inputs">
                <input class="chip-input" id="fPriceMin" type="text" inputmode="numeric" autocomplete="off" placeholder="dan" />
                <span class="advanced-filters__sep">—</span>
                <input class="chip-input" id="fPriceMax" type="text" inputmode="numeric" autocomplete="off" placeholder="gacha" />
              </div>
            </div>
          </div>
        </div>
      </div>
      <button class="chip-btn" id="btnFilter">Qidirish</button>
    </div>

    <div class="listing-grid" id="listingGrid">
      <!-- JS orqali to'ldiriladi -->
    </div>

    <button class="load-more-btn" id="btnLoadMore" hidden>Ko'proq ko'rsatish</button>

    <div class="empty-state" id="feedEmpty" hidden>
      <div class="empty-state__gauge">0</div>
      <p>Hozircha e'lon yo'q.<br/>Birinchi bo'lib joylang!</p>
    </div>
  </main>

  <!-- ============ DETAIL VIEW ============ -->
  <main class="view" id="view-detail" hidden>
    <div id="detailContent"></div>
    <div class="submit-actions">
      <button type="button" class="submit-btn" data-back="feed">Orqaga qaytish</button>
      <button type="button" class="submit-btn" id="btnCreateFromDetail">E'lon berish</button>
    </div>
  </main>

  <!-- ============ MY LISTINGS VIEW ============ -->
  <main class="view" id="view-my" hidden>
    <h2 class="section-title">Mening e'lonlarim</h2>
    <div class="listing-grid" id="myListingGrid"></div>
    <div class="empty-state" id="myEmpty" hidden>
      <p>Siz hali e'lon joylamagansiz.</p>
    </div>
    <div class="submit-actions">
      <button type="button" class="submit-btn" data-back="feed">Orqaga qaytish</button>
      <button type="button" class="submit-btn" id="btnCreateFromMy">E'lon berish</button>
    </div>
  </main>

  <!-- ============ CREATE VIEW ============ -->
  <main class="view" id="view-create" hidden>
    <h2 class="section-title" id="createFormTitle">Yangi e'lon</h2>
    <form id="createForm" class="form">
      <div class="form-row">
        <div class="autocomplete">
          <label>Marka *<input required name="brand" id="cBrand" type="text" placeholder="Chevrolet" autocomplete="off" /></label>
          <ul class="autocomplete__list" id="cBrandList" hidden></ul>
        </div>
        <label>Model *<input required name="model" type="text" placeholder="Cobalt" /></label>
      </div>
      <div class="form-row form-row--3">
        <label>Yili *<input required name="year" type="number" min="1970" max="2027" placeholder="2021" /></label>
        <label>Probeg, km *<input required name="mileage" id="cMileage" type="text" inputmode="numeric" autocomplete="off" placeholder="45 000" /></label>
        <label>Narxi, $ *<input required name="price" id="cPrice" type="text" inputmode="numeric" autocomplete="off" placeholder="12 000" /></label>
      </div>
      <div class="form-row">
        <label>Uzatma
          <select name="transmission">
            <option value="">Tanlang</option>
            <option>Avtomat</option>
            <option>Mexanika</option>
            <option>Variator</option>
          </select>
        </label>
        <label>Yoqilg'i
          <select name="fuel_type">
            <option value="">Tanlang</option>
            <option>Benzin</option>
            <option>Benzin/Gaz</option>
            <option>Dizel</option>
            <option>Gibrid</option>
            <option>Elektr</option>
          </select>
        </label>
      </div>
      <div class="form-row">
        <label>Hudud *
          <select required name="region" id="cRegion">
            <option value="">Tanlang</option>
          </select>
        </label>
        <label>Shahar yoki tuman
          <select name="district" id="cDistrict" disabled>
            <option value="">Avval hududni tanlang</option>
          </select>
        </label>
      </div>
      <div class="form-row">
        <label>Aloqa uchun telefon *<input required name="contact_phone" type="tel" placeholder="+998 90 123 45 67" /></label>
        <label id="photoField">Rasmlar (ko'pi bilan 4 ta)<input id="photoInput" type="file" accept="image/*" multiple /></label>
      </div>
      <label>Tavsif<textarea name="description" rows="4" maxlength="300" placeholder="Avtomobil holati haqida qo'shimcha ma'lumot"></textarea></label>
      <div class="submit-actions">
        <button type="button" class="submit-btn" data-back="feed">Orqaga qaytish</button>
        <button type="submit" class="submit-btn" id="btnSubmitCreate">
          <span class="submit-btn__spinner" aria-hidden="true"></span>
          <span class="submit-btn__label">E'lonni joylash</span>
        </button>
      </div>
      <p class="form-hint" id="createFormHint">E'lon joylashdan oldin admin tomonidan ko'rib chiqiladi.</p>
    </form>
  </main>

  <!-- Pastki tugma -->
  <button class="bottom-btn" id="btnCreate">E'lon berish</button>
</div>

<div class="toast" id="toast"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox__close" id="lightboxClose" aria-label="Yopish">✕</button>
  <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" aria-label="Oldingi rasm">‹</button>
  <img class="lightbox__img" id="lightboxImg" src="" alt="" />
  <button class="lightbox__nav lightbox__nav--next" id="lightboxNext" aria-label="Keyingi rasm">›</button>
</div>

<script src="js/app.js?v=22"></script>
</body>
</html>
